# ========================================================================
# 테스트 환경 전용 설정
# ========================================================================

ocr:
  # ----------------------------------------------------------------------
  # 알고리즘 및 파싱 설정 
  # ----------------------------------------------------------------------
  algorithm:
    # 테스트 결과물이 원본 샘플(vis/) 디렉토리와 충돌하지 않도록 빌드 경로 내로 격리
    debug-output-dir: "build/test-results/ocr-debug"
    
  # ----------------------------------------------------------------------
  # 시스템 비동기 설정 
  # ----------------------------------------------------------------------
  async:
    # 모델 로딩 및 최초 추론 시간을 고려하여 타임아웃을 여유 있게 설정 
    inference-timeout-ms: 60000

# ----------------------------------------------------------------------
# 테스트 시 디버깅을 위한 로깅 레벨 설정
# ----------------------------------------------------------------------
logging:
  level:
    "[com.example.ocr]": DEBUG
